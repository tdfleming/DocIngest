site_name: DocIngest
site_description: The open-source ingestion backend for RAG
site_url: https://tdfleming.github.io/DocIngest/
repo_url: https://github.com/tdfleming/DocIngest
repo_name: tdfleming/DocIngest
edit_uri: edit/master/docs-site/

docs_dir: docs-site

theme:
  name: material
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - navigation.instant
    - content.code.copy
    - search.suggest
    - search.highlight

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Configuration: configuration.md
  - Graph RAG: graph-rag.md
  - MCP & CLI: integrations.md
  - Deployment: deployment.md
  - API Reference: api-reference.md
  - Telemetry: telemetry.md
  - Benchmarks: benchmarks.md
