<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" role="img" aria-label="DocIngest ingestion pipeline diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f1f5f9"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/>
    </marker>
    <style>
      .card { fill:#ffffff; stroke:#cbd5e1; stroke-width:1.5; }
      .step { fill:#eef2ff; stroke:#6366f1; stroke-width:1.5; }
      .graph { fill:#faf5ff; stroke:#a855f7; stroke-width:1.5; }
      .store { fill:#f0fdfa; stroke:#14b8a6; stroke-width:1.5; }
      .label { fill:#0f172a; font-size:17px; font-weight:600; }
      .sub { fill:#64748b; font-size:12px; }
      .title { fill:#0f172a; font-size:26px; font-weight:700; }
      .tag { fill:#475569; font-size:13px; font-weight:600; }
      .flow { stroke:#94a3b8; stroke-width:2; fill:none; }
    </style>
  </defs>

  <rect x="0" y="0" width="1200" height="520" rx="18" fill="url(#bg)"/>
  <text x="40" y="52" class="title">DocIngest — ingestion pipeline</text>
  <text x="40" y="78" class="sub">Document in, searchable vectors and a knowledge graph out — every layer multi-tenant.</text>

  <!-- Pipeline row -->
  <g>
    <!-- Upload -->
    <rect x="40"  y="120" width="150" height="70" rx="12" class="step"/>
    <text x="115" y="150" text-anchor="middle" class="label">Upload</text>
    <text x="115" y="170" text-anchor="middle" class="sub">PDF · DOCX · HTML · MD</text>

    <!-- Convert -->
    <rect x="230" y="120" width="150" height="70" rx="12" class="step"/>
    <text x="305" y="150" text-anchor="middle" class="label">Convert</text>
    <text x="305" y="170" text-anchor="middle" class="sub">Docling → Markdown</text>

    <!-- Chunk -->
    <rect x="420" y="120" width="150" height="70" rx="12" class="step"/>
    <text x="495" y="150" text-anchor="middle" class="label">Chunk</text>
    <text x="495" y="170" text-anchor="middle" class="sub">two-pass semantic</text>

    <!-- Embed -->
    <rect x="610" y="120" width="150" height="70" rx="12" class="step"/>
    <text x="685" y="150" text-anchor="middle" class="label">Embed</text>
    <text x="685" y="170" text-anchor="middle" class="sub">FastEmbed (local)</text>

    <!-- Store -->
    <rect x="800" y="120" width="150" height="70" rx="12" class="step"/>
    <text x="875" y="150" text-anchor="middle" class="label">Store</text>
    <text x="875" y="170" text-anchor="middle" class="sub">Qdrant vectors</text>

    <!-- Search -->
    <rect x="990" y="120" width="150" height="70" rx="12" class="step"/>
    <text x="1065" y="150" text-anchor="middle" class="label">Search</text>
    <text x="1065" y="170" text-anchor="middle" class="sub">vector + rerank</text>

    <!-- arrows between steps -->
    <line x1="190" y1="155" x2="230" y2="155" class="flow" marker-end="url(#arrow)"/>
    <line x1="380" y1="155" x2="420" y2="155" class="flow" marker-end="url(#arrow)"/>
    <line x1="570" y1="155" x2="610" y2="155" class="flow" marker-end="url(#arrow)"/>
    <line x1="760" y1="155" x2="800" y2="155" class="flow" marker-end="url(#arrow)"/>
    <line x1="950" y1="155" x2="990" y2="155" class="flow" marker-end="url(#arrow)"/>
  </g>

  <!-- Optional graph branch -->
  <g>
    <path d="M875,190 L875,270" class="flow" marker-end="url(#arrow)"/>
    <rect x="700" y="270" width="350" height="66" rx="12" class="graph"/>
    <text x="875" y="298" text-anchor="middle" class="label">Build graph <tspan class="sub">(optional)</tspan></text>
    <text x="875" y="320" text-anchor="middle" class="sub">spaCy entities &amp; relationships → Leiden communities</text>
  </g>

  <!-- Async engine tag -->
  <text x="40" y="240" class="tag">Async workers (ARQ / Redis)</text>
  <line x1="40" y1="250" x2="620" y2="250" stroke="#e2e8f0" stroke-width="1.5" stroke-dasharray="4 4"/>

  <!-- Storage row -->
  <text x="40" y="400" class="tag">Storage &amp; state</text>
  <g>
    <rect x="40"  y="416" width="200" height="64" rx="12" class="store"/>
    <text x="140" y="446" text-anchor="middle" class="label">MongoDB</text>
    <text x="140" y="465" text-anchor="middle" class="sub">metadata + graph</text>

    <rect x="270" y="416" width="200" height="64" rx="12" class="store"/>
    <text x="370" y="446" text-anchor="middle" class="label">Qdrant</text>
    <text x="370" y="465" text-anchor="middle" class="sub">per-tenant vectors</text>

    <rect x="500" y="416" width="200" height="64" rx="12" class="store"/>
    <text x="600" y="446" text-anchor="middle" class="label">MinIO / S3</text>
    <text x="600" y="465" text-anchor="middle" class="sub">source + Markdown blobs</text>

    <rect x="730" y="416" width="200" height="64" rx="12" class="store"/>
    <text x="830" y="446" text-anchor="middle" class="label">Redis</text>
    <text x="830" y="465" text-anchor="middle" class="sub">job queue + rate limit</text>

    <rect x="960" y="416" width="200" height="64" rx="12" class="card"/>
    <text x="1060" y="446" text-anchor="middle" class="label">FastAPI</text>
    <text x="1060" y="465" text-anchor="middle" class="sub">REST API + React UI</text>
  </g>
</svg>
