name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: python -m pip install "ruff>=0.9,<1"
      - name: ruff check
        run: ruff check src/ tests/

  backend:
    name: Backend tests (pytest)
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      # Integration tests read this; defaults to localhost:27017 otherwise.
      MONGODB_URI: mongodb://localhost:27017
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install package + dev dependencies
        run: python -m pip install -e ".[dev]"
      # Entity-extraction tests use the small spaCy model (not en_core_web_lg,
      # which is only needed by the graph worker at runtime).
      - name: Download spaCy model
        run: python -m spacy download en_core_web_sm
      - name: Run tests
        run: pytest -q

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      # Runs `tsc --noEmit && vite build` — strict type-check + production build.
      - name: Build
        run: npm run build

  dockerfiles:
    name: Dockerfile lint (hadolint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Lint every Dockerfile; only hard errors fail the build (warnings such as
      # unpinned pip packages are surfaced but non-blocking for now).
      - name: Lint Dockerfiles
        run: |
          for f in docker/*.Dockerfile; do
            echo "== $f =="
            docker run --rm -i hadolint/hadolint hadolint --failure-threshold error - < "$f"
          done
